id: cb-011
title: "Add a label to a GitHub issue"
difficulty: easy
category: project_mgmt
description: |
  Add the label "priority:high" to issue #45 in the repository
  "acme-corp/web-platform". The issue is about a memory leak in the
  websocket handler.
tools_provided:
  - gh
initial_state:
  gh:
    repos:
      acme-corp/web-platform:
        labels:
          - name: "priority:high"
            color: "ff0000"
          - name: "priority:low"
            color: "00ff00"
          - name: "bug"
            color: "d73a4a"
        issues:
          - number: 45
            title: "Memory leak in websocket handler"
            state: open
            assignee: null
            labels: ["bug"]
          - number: 46
            title: "Migrate to Node 20"
            state: open
            assignee: dave
            labels: ["chore"]
expected_state:
  gh:
    repos:
      acme-corp/web-platform:
        issues:
          - number: 45
            labels: ["bug", "priority:high"]
    command_history:
      - pattern: "gh issue edit 45.*--add-label.*priority:high"
scoring:
  outcome: 0.6
  efficiency: 0.2
  recovery: 0.2
max_turns: 3
optimal_commands: 1
timeout_seconds: 30
