id: cb-052
title: "(flowctl) [exploration] Create workflow without docs"
difficulty: medium
category: custom_cli_exploration
description: |
  Create a new workflow named "deploy-staging" using the flowctl tool.
  The workflow should have two steps: a "build" step with action "run_pipeline"
  and an "approve" step with action "gate". Set the owner to "devops-team".
  You are not provided with documentation — discover the tool's commands yourself.
tools_provided:
  - flowctl
doc_visibility: name_only
optimal_help_calls: 2
