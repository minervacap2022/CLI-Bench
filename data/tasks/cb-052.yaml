  flowctl:
    workflows: []
    gates: []
    runs: []
expected_state:
  flowctl:
    command_history:
      - pattern: "flowctl workflow create.*--name deploy-staging"
    workflows:
      - name: deploy-staging
        owner: devops-team
scoring:
  outcome: 0.5
  efficiency: 0.15
  recovery: 0.15
  exploration: 0.2
