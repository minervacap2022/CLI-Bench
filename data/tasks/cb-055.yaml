id: cb-055
title: "(alertmgr) [exploration] Acknowledge and resolve alert without docs"
difficulty: hard
category: custom_cli_exploration
description: |
  Using the alertmgr tool:
  1. First list all critical active alerts.
  2. Acknowledge alert "alt-001" with comment "Investigating high CPU".
  3. Resolve alert "alt-001" with resolution "Scaled up instances, load normalized".
  You are not provided with documentation — discover the tool's commands yourself.
tools_provided:
  - alertmgr
doc_visibility: name_only
optimal_help_calls: 3
initial_state:
  alertmgr:
    alerts:
      - id: alt-001
        title: "High CPU on api-server"
        severity: critical
        status: active
        service: api-server
      - id: alt-002
        title: "Disk usage warning on db-primary"
        severity: warning
        status: active
        service: db-primary
      - id: alt-003
        title: "Latency spike in payment-svc"
        severity: critical
        status: active
        service: payment-svc
    rules: []
    escalations: []
    incidents: []
expected_state:
  alertmgr:
    command_history:
      - pattern: "alertmgr alert list.*--severity critical.*--status active"
      - pattern: "alertmgr alert acknowledge.*--id alt-001"
      - pattern: "alertmgr alert resolve.*--id alt-001"
    output_contains:
      - "alt-001"
      - "alt-003"
scoring:
  outcome: 0.5
  efficiency: 0.15
  recovery: 0.15
  exploration: 0.2
max_turns: 12
optimal_commands: 3
timeout_seconds: 90
