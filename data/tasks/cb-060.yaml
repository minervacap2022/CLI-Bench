id: cb-060
title: "(flowctl) [exploration] Approve a gate without docs"
difficulty: medium
category: custom_cli_exploration
description: |
  Using the flowctl tool:
  1. Get the details of workflow "wf-001".
  2. Approve gate "gate-001" with comment "LGTM, deploying to production".
  You are not provided with documentation — discover the tool's commands yourself.
tools_provided:
  - flowctl
doc_visibility: name_only
optimal_help_calls: 2
initial_state:
  flowctl:
    workflows:
      - id: wf-001
        name: deploy-prod
        status: active
        owner: alice
        steps:
          - name: build
            action: run_pipeline
          - name: approve
            action: gate
    gates:
      - id: gate-001
        workflow_id: wf-001
        approvers: ["alice", "bob"]
        status: pending
        min_approvals: 1
    runs: []
expected_state:
  flowctl:
    command_history:
      - pattern: "flowctl workflow get.*--id wf-001"
      - pattern: "flowctl gate approve.*--id gate-001"
    output_contains:
      - "deploy-prod"
scoring:
  outcome: 0.5
  efficiency: 0.15
  recovery: 0.15
  exploration: 0.2
max_turns: 10
optimal_commands: 2
timeout_seconds: 60
