id: cb-058
title: "(datapipe) [exploration] Build a full pipeline without docs"
difficulty: hard
category: custom_cli_exploration
description: |
  Using the datapipe tool, build a complete data pipeline:
  1. Create a transform named "daily-revenue" with SQL
     "SELECT date, SUM(amount) as revenue FROM orders GROUP BY date"
     using source "prod-db".
  2. Create an S3 sink named "analytics-lake" with config
     {"bucket": "analytics-output", "prefix": "daily/"}.
  3. Create a pipeline named "daily-etl" connecting source "prod-db",
     transform "daily-revenue", sink "analytics-lake", with schedule "0 2 * * *".
  You are not provided with documentation — discover the tool's commands yourself.
tools_provided:
  - datapipe
doc_visibility: name_only
optimal_help_calls: 3
initial_state:
  datapipe:
    sources:
      - id: src-001
        name: prod-db
        type: postgres
        config:
          host: db.example.com
          port: 5432
          database: analytics
    transforms: []
    sinks: []
    pipelines: []
expected_state:
  datapipe:
    command_history:
      - pattern: "datapipe transform create.*--name daily-revenue"
      - pattern: "datapipe sink create.*--name analytics-lake.*--type s3"
      - pattern: "datapipe pipeline create.*--name daily-etl"
    transforms:
      - name: daily-revenue
    sinks:
      - name: analytics-lake
    pipelines:
      - name: daily-etl
scoring:
  outcome: 0.5
  efficiency: 0.15
  recovery: 0.15
  exploration: 0.2
max_turns: 15
optimal_commands: 3
timeout_seconds: 120
